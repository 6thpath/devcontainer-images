name: TypeScript Node - Nightly

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'source/typescript-node/Dockerfile'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: STAGING
    permissions:
      contents: read
      packages: write
    env:
      REPO: typescript-node
      NODE_VERSION: 24.18.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: tag_builder
        name: Generate build tags
        run: |
          TIMESTAMP=$(date +'%Y%m%d')
          SHA=$(git rev-parse --short HEAD)
          echo "build_tag=nightly-${TIMESTAMP}-${SHA}" >> $GITHUB_OUTPUT
          echo "Generated build tag: nightly-${TIMESTAMP}-${SHA}"

          # expose a separate tag for testing purposes
          echo "test_tag=nightly-test-${TIMESTAMP}-${SHA}" >> $GITHUB_OUTPUT
          echo "Generated test tag: nightly-test-${TIMESTAMP}-${SHA}"

      - name: Build image for testing
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: source/typescript-node
          platforms: linux/amd64
          push: false
          load: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPO }}:${{ steps.tag_builder.outputs.test_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run test
        run: |
          TEST_IMAGE="${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPO }}:${{ steps.tag_builder.outputs.test_tag }}"
          echo "Running smoke test against $TEST_IMAGE"
          ACTUAL_NODE_VERSION="$(docker run --rm "$TEST_IMAGE" node -v)"
          echo "Image Node.js version: $ACTUAL_NODE_VERSION"

          if [[ "$ACTUAL_NODE_VERSION" != "v${{ env.NODE_VERSION }}" ]]; then
            echo "Expected Node.js v${{ env.NODE_VERSION }}, got $ACTUAL_NODE_VERSION"
            exit 1
          fi

          docker run --rm "$TEST_IMAGE" sh -lc 'pnpm -v && tsc -v && eslint -v && prettier -v && zsh --version && test "$(whoami)" = "nonroot"'

      - name: Build & Push image to registries
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: source/typescript-node
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ env.REPO }}:${{ steps.tag_builder.outputs.build_tag }}
            ghcr.io/${{ github.repository_owner }}/${{ env.REPO }}:${{ steps.tag_builder.outputs.build_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
